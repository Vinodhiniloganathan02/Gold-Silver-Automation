name: Gold Silver Automation

on:
  schedule:
    - cron: '36 12 * * *'   # Runs daily at 6:06 PM IST

  workflow_dispatch:

jobs:
  run-automation:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Python script
        run: python dailygoldrates.py
